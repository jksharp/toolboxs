<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>武汉市新华书店 · 集团供应中心工具箱（管理版）</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03060c);
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            padding: 2rem;
            position: relative;
        }
        .orb {
            position: fixed;
            width: 60vmax;
            height: 60vmax;
            border-radius: 50%;
            filter: blur(80px);
            animation: float 20s infinite alternate ease-in-out;
            pointer-events: none;
            z-index: 0;
        }
        .orb1 { top: -20vh; left: -20vw; background: radial-gradient(circle, rgba(0, 200, 255, 0.2), transparent 80%); }
        .orb2 { bottom: -30vh; right: -10vw; width: 70vmax; height: 70vmax; background: radial-gradient(circle, rgba(150, 0, 255, 0.15), transparent 70%); animation-duration: 25s; }
        @keyframes float {
            0% { transform: translate(0, 0) scale(1); opacity: 0.6; }
            100% { transform: translate(5%, 5%) scale(1.1); opacity: 0.9; }
        }
        .container { position: relative; z-index: 2; max-width: 1400px; margin: 0 auto; }
        .hero { text-align: center; margin-bottom: 3rem; }
        .hero h1 { font-size: 3rem; font-weight: 800; background: linear-gradient(135deg, #FFFFFF, #A0D8FF, #7AA2F7); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .hero p { color: #9aaec7; font-size: 1rem; margin-top: 0.5rem; }
        .toolbar { display: flex; flex-wrap: wrap; justify-content: center; gap: 0.8rem; margin-bottom: 2rem; }
        .action-btn {
            background: rgba(20, 30, 50, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 180, 255, 0.5);
            border-radius: 40px;
            padding: 0.5rem 1.2rem;
            font-size: 0.8rem;
            font-weight: 500;
            color: #cae9ff;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .action-btn:hover { background: rgba(0, 140, 230, 0.3); border-color: cyan; transform: translateY(-2px); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 2rem; margin: 2rem 0 2rem; }
        .card {
            background: rgba(20, 28, 40, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            border: 1px solid rgba(72, 187, 255, 0.3);
            padding: 1.5rem;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }
        .card:hover { transform: translateY(-6px); border-color: #00b4ff; background: rgba(25, 35, 55, 0.8); box-shadow: 0 20px 30px -12px black; }
        .icon { font-size: 3rem; margin-bottom: 0.8rem; }
        .card h3 { font-size: 1.4rem; font-weight: 600; color: #eef5ff; margin-bottom: 0.5rem; }
        .card p { color: #b9c8f0; font-size: 0.85rem; line-height: 1.5; flex: 1; margin-bottom: 1rem; }
        .badge { background: rgba(0, 180, 255, 0.2); border-radius: 40px; padding: 0.2rem 1rem; font-size: 0.7rem; color: #7bc5ff; width: fit-content; }
        .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 0.5rem; }
        .btn-launch {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(0, 212, 255, 0.5);
            color: #cae9ff;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.75rem;
            cursor: pointer;
        }
        .btn-launch:hover { background: rgba(0, 160, 255, 0.3); border-color: cyan; }
        .btn-edit, .btn-delete {
            background: none;
            border: none;
            color: #a0b8d4;
            font-size: 0.7rem;
            cursor: pointer;
            margin-left: 8px;
            padding: 4px;
        }
        .btn-edit:hover { color: #ffb347; }
        .btn-delete:hover { color: #ff6b6b; }
        .edit-panel {
            background: rgba(12, 18, 28, 0.95);
            backdrop-filter: blur(16px);
            border-radius: 2rem;
            padding: 1.5rem;
            margin-top: 1rem;
            border: 1px solid rgba(0, 200, 255, 0.5);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }
        .form-title { color: #b3e4ff; font-size: 0.9rem; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: baseline; }
        .edit-status { background: #0a1a2c; border-radius: 30px; padding: 0.2rem 0.8rem; font-size: 0.7rem; color: #2dd4ff; }
        .form-grid { display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-end; }
        .field { flex: 1; min-width: 160px; }
        .field label { display: block; font-size: 0.7rem; color: #8db2e0; margin-bottom: 4px; }
        .field input, .field textarea { width: 100%; background: #111722; border: 1px solid #2a3a5a; border-radius: 2rem; padding: 0.6rem 1rem; color: white; font-size: 0.85rem; }
        .field textarea { border-radius: 1.2rem; resize: vertical; }
        .form-actions { display: flex; gap: 0.8rem; margin-top: 1rem; }
        .primary-btn { background: #2b4c7c; border: none; border-radius: 2rem; padding: 0.6rem 1.4rem; color: white; cursor: pointer; font-weight: bold; }
        .primary-btn:hover { background: #1e6ab3; }
        .secondary-btn { background: rgba(50, 70, 100, 0.7); border: 1px solid #4f7aa6; border-radius: 2rem; padding: 0.6rem 1.2rem; color: #d6ecff; cursor: pointer; }
        .footer-note { text-align: center; color: #62748c; border-top: 1px solid rgba(72, 120, 184, 0.3); padding-top: 2rem; margin-top: 1rem; font-size: 0.8rem; }
        @media (max-width: 700px) { .hero h1 { font-size: 2rem; } .form-grid { flex-direction: column; } }
    </style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="container">
    <div class="hero">
        <h1>📚 武汉市新华书店 · 集团供应中心工具箱</h1>
        <p>管理后台 | 数据自动保存云端 KV</p>
    </div>

    <div class="toolbar">
        <button class="action-btn" id="clearAllBtn">🗑️ 清空所有工具</button>
        <button class="action-btn" id="resetDefaultBtn">🔄 重置默认工具</button>
        <button class="action-btn" id="exportJsonBtn">📎 导出 JSON</button>
        <button class="action-btn" id="importJsonBtn">📂 导入 JSON</button>
        <button class="action-btn" id="exportStaticBtn">⚡ 导出静态导航页</button>
        <input type="file" id="importFileInput" accept=".json" style="display: none;">
    </div>

    <div class="grid" id="toolsGrid"></div>

    <div class="edit-panel">
        <div class="form-title">
            <span>✏️ 工具配置面板</span>
            <span class="edit-status" id="editModeLabel">✨ 新增模式</span>
        </div>
        <div class="form-grid">
            <div class="field"><label>工具名称</label><input type="text" id="editName" placeholder="例：订单统计"></div>
            <div class="field"><label>页面路径 (URL)</label><input type="text" id="editUrl" placeholder="例：stats.html 或 https://"></div>
            <div class="field"><label>图标 Emoji</label><input type="text" id="editIcon" placeholder="📊" value="📄"></div>
            <div class="field"><label>简短描述</label><textarea id="editDesc" rows="1" placeholder="工具功能简述..."></textarea></div>
        </div>
        <div class="form-actions">
            <button class="primary-btn" id="addUpdateBtn">➕ 添加新工具</button>
            <button class="secondary-btn" id="cancelEditBtn">✖️ 取消编辑</button>
        </div>
    </div>

    <div class="footer-note">
        💡 所有操作自动保存到云端 KV，index.html 自动同步显示。
    </div>
</div>

<script>
const DEFAULT_TOOLS = [
    { id: "entry", name: "📝 数据录入", desc: "快速扫码/手动录入图书，支持三种模式，自动合并重复书号，生成发货单与汇总单。", icon: "📚", url: "工具箱-数据录入.html" },
    { id: "review", name: "✅ 数据复核", desc: "导入Excel数据复核，自动识别ISBN列，过滤空列，支持双击编辑和ISBN快速定位。", icon: "🔍", url: "工具箱-数据复核.html" },
    { id: "transfer", name: "🔄 批销直转", desc: "将供货商Excel转换为标准批销格式，按包号分组打包ZIP，智能列映射。", icon: "📦", url: "工具箱-数据直转.html" },
    { id: "dd", name: "🧾 订单大屏", desc: "通过大屏展示订单的到货情况批销情况。", icon: "📈", url: "工具箱-订单大屏.html" },
    { id: "dd-jd", name: "📑 订单大屏简单版", desc: "通过大屏展示订单的简单到货情况。", icon: "📉", url: "工具箱-订单大屏简单版.html" },
    { id: "jh", name: "💡 鲲鹏计划", desc: "一个简单的计划展示大屏幕。", icon: "💎", url: "工具箱-鲲鹏计划AI版.html" },
    { id: "jxkh", name: "⌚绩效考核", desc: "一个简单的绩效记录工具", icon: "📆", url: "工具箱-绩效管理.html" },
    { id: "fh-jq", name: "🎡数据复核-加强版", desc: "数据复核功能的加强版本，能对比订单批销数据的差异", icon: "🎡", url: "工具箱-数据复核(加强版).html" },
    { id: "jxkh-jq", name: "🎒工具箱-绩效管理（持久数据版）", desc: "绩效管理工具，能做简单的绩效打分，数据能持久化", icon: "⚽", url: "工具箱-绩效管理(持久数据版).html" }
];

let toolsList = [];
let currentEditId = null;

function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
function escapeAttr(str) { if (!str) return ''; return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

async function saveToCloud() {
  try {
    const res = await fetch('/api/tools', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(toolsList)
    });
    
    const result = await res.json();
    if (res.ok) {
      console.log("✅ 云端保存成功：", result);
      // 可选：加个成功提示
       alert('✅ 数据已同步到云端KV！');
    } else {
      console.error("❌ 云端保存失败：", result);
      alert(`❌ 保存失败：${result.error || '未知错误'}`);
    }
  } catch (e) {
    console.error("❌ 请求发送失败：", e);
    alert(`❌ 连接云端失败：${e.message}`);
  }
}

async function loadFromCloud() {
    try {
        const r = await fetch('/api/tools');
        const d = await r.json();
        toolsList = Array.isArray(d) && d.length ? d : [...DEFAULT_TOOLS];
    } catch (e) {
        toolsList = [...DEFAULT_TOOLS];
    }
    render();
}

function render() {
    const g = document.getElementById('toolsGrid');
    g.innerHTML = '';
    if (!toolsList.length) {
        g.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#8aa9cc;padding:3rem;">📭 暂无工具</div>';
        return;
    }
    toolsList.forEach(t => {
        const c = document.createElement('div');
        c.className = 'card';
        c.innerHTML = `
            <div class="icon">${escapeHtml(t.icon || '📄')}</div>
            <h3>${escapeHtml(t.name)}</h3>
            <p>${escapeHtml(t.desc || '无描述')}</p>
            <div class="card-footer">
                <span class="badge">⚙️ 工具</span>
                <div>
                    <button class="btn-edit" data-id="${escapeAttr(t.id)}">✏️ 编辑</button>
                    <button class="btn-delete" data-id="${escapeAttr(t.id)}">🗑️ 删除</button>
                    <button class="btn-launch" data-url="${escapeAttr(t.url)}">🚀 启动</button>
                </div>
            </div>`;
        c.onclick = e => e.target.tagName !== 'BUTTON' && window.open(t.url, '_blank');
        g.appendChild(c);
    });

    document.querySelectorAll('.btn-edit').forEach(b => b.onclick = () => {
        const t = toolsList.find(x => x.id === b.dataset.id);
        currentEditId = t.id;
        document.getElementById('editName').value = t.name;
        document.getElementById('editUrl').value = t.url;
        document.getElementById('editIcon').value = t.icon || '📄';
        document.getElementById('editDesc').value = t.desc || '';
        document.getElementById('editModeLabel').textContent = '✏️ 编辑：' + t.name.substring(0, 25);
        document.getElementById('addUpdateBtn').textContent = '💾 更新工具';
    });

    document.querySelectorAll('.btn-delete').forEach(b => b.onclick = async () => {
        if (!confirm('确定删除？')) return;
        toolsList = toolsList.filter(x => x.id !== b.dataset.id);
        await saveToCloud();
        render();
    });

    document.querySelectorAll('.btn-launch').forEach(b => b.onclick = () => window.open(b.dataset.url, '_blank'));
}

document.getElementById('addUpdateBtn').onclick = async () => {
    const name = document.getElementById('editName').value.trim();
    const url = document.getElementById('editUrl').value.trim();
    const icon = document.getElementById('editIcon').value.trim() || '📄';
    const desc = document.getElementById('editDesc').value.trim();
    if (!name || !url) { alert('名称和URL不能为空！'); return; }

    if (currentEditId) {
        const i = toolsList.findIndex(x => x.id === currentEditId);
        if (i !== -1) toolsList[i] = { ...toolsList[i], name, url, icon, desc };
    } else {
        toolsList.push({ id: Date.now().toString(36), name, url, icon, desc });
    }

    await saveToCloud();
    currentEditId = null;
    document.getElementById('editName').value = '';
    document.getElementById('editUrl').value = '';
    document.getElementById('editIcon').value = '📄';
    document.getElementById('editDesc').value = '';
    document.getElementById('editModeLabel').textContent = '✨ 新增模式';
    document.getElementById('addUpdateBtn').textContent = '➕ 添加新工具';
    render();
};

document.getElementById('cancelEditBtn').onclick = () => {
    currentEditId = null;
    document.getElementById('editName').value = '';
    document.getElementById('editUrl').value = '';
    document.getElementById('editIcon').value = '📄';
    document.getElementById('editDesc').value = '';
    document.getElementById('editModeLabel').textContent = '✨ 新增模式';
    document.getElementById('addUpdateBtn').textContent = '➕ 添加新工具';
};

document.getElementById('clearAllBtn').onclick = async () => {
    if (!confirm('确定清空所有？')) return;
    toolsList = [];
    await saveToCloud();
    render();
};

document.getElementById('resetDefaultBtn').onclick = async () => {
    if (!confirm('确定恢复默认9个工具？')) return;
    toolsList = JSON.parse(JSON.stringify(DEFAULT_TOOLS));
    await saveToCloud();
    render();
};

document.getElementById('exportJsonBtn').onclick = () => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([JSON.stringify(toolsList, null, 2)], { type: 'application/json' }));
    a.download = 'toolbox_backup.json';
    a.click();
    URL.revokeObjectURL(a.href);
};

document.getElementById('importJsonBtn').onclick = () => document.getElementById('importFileInput').click();
document.getElementById('importFileInput').onchange = e => {
    const f = e.target.files[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = async () => {
        try {
            const arr = JSON.parse(r.result);
            if (!Array.isArray(arr)) throw new Error('格式错误');
            toolsList = arr.map(i => ({ id: i.id || Date.now().toString(36), name: i.name, url: i.url, icon: i.icon || '📄', desc: i.desc || '' }));
            await saveToCloud();
            render();
            alert('导入成功！已保存云端！');
        } catch (err) {
            alert('导入失败：' + err.message);
        }
    };
    r.readAsText(f);
};

document.getElementById('exportStaticBtn').onclick = () => {
    const html = `<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>静态导航</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0f1e;color:white;padding:2rem;font-family:system-ui}
        .container{max-width:1400px;margin:0 auto}
        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:2rem;margin-top:2rem}
        .card{background:#141c28;border-radius:2rem;padding:1.5rem}
        .icon{font-size:3rem;margin-bottom:.8rem}
        h3{color:#eef5ff}
        p{color:#b9c8f0}
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 静态导航</h1>
        <div class="grid">
            ${toolsList.map(t => `
            <div class="card" onclick="window.open('${escapeAttr(t.url)}','_blank')">
                <div class="icon">${escapeHtml(t.icon || '📄')}</div>
                <h3>${escapeHtml(t.name)}</h3>
                <p>${escapeHtml(t.desc || '无描述')}</p>
            </div>`).join('')}
        </div>
    </div>
</body>
</html>`;
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([html], { type: 'text/html' }));
    a.download = 'toolbox_static.html';
    a.click();
    URL.revokeObjectURL(a.href);
};

loadFromCloud();
</script>
</body>
</html>
