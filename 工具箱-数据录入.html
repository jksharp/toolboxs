<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>数据录入模块 · 新华书店工具箱</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #eef2f7; font-family: 'Segoe UI', Roboto, sans-serif; height: 100vh; overflow: hidden; font-size: 13px; }
        .module { display: flex; flex-direction: column; height: 100vh; background: white; }
        .module-header { background: linear-gradient(135deg, #1e3c72, #2a4b7a); padding: 8px 20px; color: white; flex-shrink: 0; }
        .module-header h2 { font-size: 1.1rem; font-weight: 500; }
        .module-header p { font-size: 0.7rem; opacity: 0.85; margin-top: 2px; }
        .toolbar { background: #fefefe; padding: 6px 16px; border-bottom: 1px solid #e2e8f0; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; flex-shrink: 0; }
        button { border: none; background: #eef2f7; padding: 5px 14px; border-radius: 20px; font-size: 0.75rem; font-weight: 500; cursor: pointer; font-family: inherit; }
        button.primary { background: #2b4c7c; color: white; }
        button.success { background: #e3f7ec; color: #2b6e3c; }
        button.danger { background: #fee2e2; color: #b91c1c; }
        button.warning { background: #fff3e0; color: #b85c00; }
        button.next-pack { background: #2d6a4f; color: white; }
        input, select { padding: 5px 10px; border: 1px solid #cbd5e1; border-radius: 20px; font-size: 0.75rem; font-family: inherit; }
        .table-wrap { flex: 1; overflow: auto; padding: 0 12px 6px 12px; }
        .entry-table { width: 100%; border-collapse: collapse; font-size: 0.75rem; min-width: 800px; }
        .entry-table th, .entry-table td { padding: 6px 10px; border-bottom: 1px solid #ecf3f9; white-space: nowrap; }
        .entry-table th { background: #f1f5f9; position: sticky; top: 0; }
        .inline-copies { width: 65px; padding: 3px 4px; border-radius: 12px; border: 1px solid #cbd5e1; text-align: center; }
        .delete-btn { background: none; border: none; color: #b91c1c; cursor: pointer; font-size: 0.7rem; }
        .entry-input-panel { background: #fefefe; border-top: 1px solid #e2e8f0; padding: 10px 20px; flex-shrink: 0; }
        .entry-form-row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 8px; }
        .entry-field-group { flex: 1; min-width: 100px; }
        .entry-field-group label { font-size: 0.7rem; font-weight: 600; color: #2c3e66; margin-bottom: 3px; display: block; }
        .entry-field-group input, .entry-field-group textarea { width: 100%; padding: 5px 8px; border: 1px solid #cbd5e1; border-radius: 16px; font-size: 0.75rem; font-family: inherit; }
        .match-info { background: #fef9e6; border-left: 3px solid #f5a623; padding: 4px 12px; font-size: 0.7rem; margin: 4px 0 0; display: flex; flex-direction: column; gap: 4px; }
        .match-info-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .pack-stats { font-size: 0.85rem; font-weight: 600; background: #e9f0f9; padding: 2px 10px; border-radius: 30px; display: inline-block; margin-left: 12px; }
        .footer-note { padding: 4px 16px; font-size: 0.65rem; color: #5b6e8c; background: #fefefe; border-top: 1px solid #ecf3f9; flex-shrink: 0; }
        .toast-tip { position: fixed; top: 40%; left: 50%; transform: translate(-50%,-50%); background: #333333ee; color: #ffdd99; padding: 12px 24px; border-radius: 40px; font-size: 1rem; z-index: 2000; pointer-events: none; border-left: 4px solid #f5a623; font-weight: 500; white-space: nowrap; transition: opacity 0.2s; }
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(2px); z-index: 3000; display: flex; align-items: center; justify-content: center; }
        .modal-container { background: white; border-radius: 20px; width: 80%; max-width: 1100px; max-height: 80%; display: flex; flex-direction: column; box-shadow: 0 20px 35px -10px rgba(0,0,0,0.3); }
        .modal-header { padding: 12px 20px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; font-weight: bold; background: #f1f5f9; border-radius: 20px 20px 0 0; }
        .modal-body { overflow: auto; padding: 10px; flex:1; }
        .modal-body table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
        .modal-body th, .modal-body td { border: 1px solid #ddd; padding: 6px 8px; text-align: left; }
        .close-modal { background: none; border: none; font-size: 1.4rem; cursor: pointer; }
        .duplicate-row-highlight { background-color: #fff3cd !important; box-shadow: inset 0 0 0 2px #ffc107; }
    </style>
</head>
<body>
<div class="module">
    <div class="module-header"><h2>📖 图书快捷录入</h2><p>三种模式：快速录入 | 完整录入 | 匹配录入（自动读取订数/册数）</p></div>
    <div class="toolbar">
        <span id="entryStats">0种/0册</span>
        <span id="currentPackStats" class="pack-stats">当前包：0种/0册</span>
        <div style="margin-left:12px;">
            <label><input type="radio" name="modeRadio" value="quick" checked>快速</label>
            <label><input type="radio" name="modeRadio" value="full">完整</label>
            <label><input type="radio" name="modeRadio" value="match">匹配</label>
        </div>
        <button id="loadMatchSourceBtn" class="warning" style="display:none;">📂 导入订单表(匹配库)</button>
        <button id="viewMatchTableBtn" class="success" style="display:none;">🔍 查看订单表</button>
        <div style="flex:1"></div>
        <button id="importExcelBtn" class="primary">📥 导入Excel</button>
        <button id="importCsvBtn" class="warning">📄 导入CSV</button>
        <button id="exportExcelBtn" class="success">📎 导出Excel</button>
        <button id="exportCsvBtn" class="warning">📎 导出CSV</button>
        <button id="clearEntryBtn" class="danger">🗑 清空全部</button>
    </div>
    <div class="toolbar" style="border-top:none; flex-wrap: wrap; gap: 8px;">
        <label>收货单位：<input id="customerName" style="width:140px;"></label>
        <label>馆配单号：<input id="consignmentNo" style="width:140px;"></label>
        <label>操作员：<input id="operatorName" style="width:100px;"></label>
        <label>制单日期：<input id="printDate" style="width:100px;"></label>
        <label>单据编号：<input id="invoiceNo" style="width:120px;" placeholder="留空则只显示单据编号："></label>
        <label>备　注：<input id="packageNote" style="width:160px;" placeholder="用于当前包打印"></label>
        <button id="printSummaryBtn" class="success">📊 打印汇总单</button>
        <button id="exportSummaryBtn" class="warning">📎 导出汇总单Excel</button>
    </div>
    <div class="table-wrap">
        <table class="entry-table"><thead><tr><th>#</th><th>包号</th><th>书号</th><th>书名</th><th>定价</th><th>本数</th><th>码洋</th><th>操作</th></tr></thead><tbody id="entryTbody"></tbody></table>
    </div>
    <div class="entry-input-panel">
        <div class="entry-form-row">
            <div class="entry-field-group" style="flex:0.8"><label>包号</label><input id="packageNoInput" value="1"></div>
            <div class="entry-field-group" style="flex:1.5"><label>书号</label><input id="bookIdInput" autocomplete="off"></div>
            <div id="fullTitleGroup" style="display:none; flex:2"><label>书名</label><input id="titleInput"></div>
            <div id="fullPriceGroup" style="display:none; flex:0.8"><label>定价</label><input id="priceInput" type="number" step="0.01"></div>
            <div class="entry-field-group" style="flex:0.8"><label>本数</label><input id="copiesInput" value="1" min="1"></div>
            <div><button id="addEntryBtn" class="primary">➕添加</button></div>
            <button id="printCurrentPackBtn" class="success">🖨️ 打印当前包</button>
            <button id="nextPackBtn" class="next-pack">📦 下一包</button>
        </div>
        <div id="matchInfo" class="match-info" style="display:none"></div>
    </div>
    <div class="footer-note">💡 输入书号后按回车：自动检测当前包重复并高亮，匹配模式同时显示订单匹配结果。添加时若有重复则确认叠加。存储键已固定，不会丢失数据。</div>
</div>

<script>
(function(){
    // ========== 固定存储键，不再变化 ==========
    const STORAGE_KEY = 'BookEntrySystem_Final';
    const LAST_PACK_KEY = 'LastPackageNo_Final';
    const NOTE_PREFIX = 'CurrentPackageNote_Final_';
    let books = [];            
    let nextId = 1;
    let matchDataSource = [];  // { isbn, title, price, qty }
    let matchSourceFileName = '';
    let currentMode = 'quick';
    
    // DOM 快捷引用
    const dom = {
        tbody: () => document.getElementById('entryTbody'),
        statsSpan: document.getElementById('entryStats'),
        packStatsSpan: document.getElementById('currentPackStats'),
        packageNoInput: document.getElementById('packageNoInput'),
        bookIdInput: document.getElementById('bookIdInput'),
        titleInput: document.getElementById('titleInput'),
        priceInput: document.getElementById('priceInput'),
        copiesInput: document.getElementById('copiesInput'),
        fullTitleGroup: document.getElementById('fullTitleGroup'),
        fullPriceGroup: document.getElementById('fullPriceGroup'),
        matchInfoDiv: document.getElementById('matchInfo'),
        loadMatchBtn: document.getElementById('loadMatchSourceBtn'),
        viewMatchTableBtn: document.getElementById('viewMatchTableBtn'),
        customerName: document.getElementById('customerName'),
        operatorName: document.getElementById('operatorName'),
        consignmentNo: document.getElementById('consignmentNo'),
        invoiceNo: document.getElementById('invoiceNo'),
        packageNote: document.getElementById('packageNote'),
        printDate: document.getElementById('printDate')
    };
    
    let tipTimer = null;
    function showTip(msg, isErr = false, dur = 2000) {
        let tip = document.getElementById('globalTip');
        if(!tip) { tip = document.createElement('div'); tip.id = 'globalTip'; tip.className = 'toast-tip'; document.body.appendChild(tip); }
        tip.style.opacity = '1';
        tip.innerText = msg;
        if(tipTimer) clearTimeout(tipTimer);
        tipTimer = setTimeout(() => { tip.style.opacity = '0'; }, dur);
    }
    function escapeHtml(str) { return String(str).replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
    function escapeAttr(str) { return String(str).replace(/[&<>"]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':m==='>'?'&gt;':'&quot;'); }
    
    // 数据存储
    function saveToLocal() { localStorage.setItem(STORAGE_KEY, JSON.stringify({ books, nextId })); }
    function loadFromLocal() {
        const raw = localStorage.getItem(STORAGE_KEY);
        if(raw) try { const data = JSON.parse(raw); books = data.books || []; nextId = data.nextId || (books.length ? Math.max(...books.map(b=>b.id)) + 1 : 1); } catch(e){ books=[]; nextId=1; }
        else { books = []; nextId = 1; }
    }
    
    // 统计 & 渲染表格
    function getPackStats(pkg) {
        const packBooks = books.filter(b => b.packageNo === pkg);
        return { varieties: packBooks.length, totalCopies: packBooks.reduce((s,b)=>s + (b.copies||0),0) };
    }
    function updatePackStatsUI() {
        const pkg = dom.packageNoInput.value.trim();
        if(pkg) { const st = getPackStats(pkg); dom.packStatsSpan.innerText = `当前包：${st.varieties}种 / ${st.totalCopies}册`; }
        else dom.packStatsSpan.innerText = '当前包：0种/0册';
    }
    function updateTotalStats() {
        const totalCopies = books.reduce((s,b)=>s + (b.copies||0),0);
        dom.statsSpan.innerText = `${books.length}种/${totalCopies}册`;
        updatePackStatsUI();
    }
    
    // 高亮管理
    function clearDuplicateHighlight() {
        document.querySelectorAll('#entryTbody tr').forEach(r => r.classList.remove('duplicate-row-highlight'));
    }
    function highlightDuplicateRow(rowElement) {
        clearDuplicateHighlight();
        if(rowElement) rowElement.classList.add('duplicate-row-highlight');
    }
    function scrollToRow(rowElement) {
        if(rowElement) rowElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
    
    // 检测当前包内重复
    function checkDuplicateInCurrentPackage(bookId, packageNo) {
        if(!bookId) return null;
        return books.find(b => b.packageNo === packageNo && b.bookId === bookId) || null;
    }
    
    // 刷新下方的信息区域 （匹配模式：匹配结果 + 重复提示；非匹配模式：仅重复提示）
    function updateInfoPanel() {
        if(!dom.matchInfoDiv) return;
        const pkg = dom.packageNoInput.value.trim();
        const isbn = dom.bookIdInput.value.trim();
        const isMatchMode = (currentMode === 'match');
        let matchHtml = '';
        let duplicateHtml = '';
        
        // 匹配模式：显示匹配库匹配结果
        if(isMatchMode && isbn) {
            const matched = matchDataSource.find(item => item.isbn === isbn);
            if(matched) {
                let info = `✅ 订单匹配：${escapeHtml(matched.title)}`;
                if(matched.price != null) info += ` 定价 ¥${matched.price.toFixed(2)}`;
                if(matched.qty != null && matched.qty > 0) info += ` (订数: ${matched.qty}册)`;
                matchHtml = `<div class="match-info-row">${info}</div>`;
            } else if(matchDataSource.length > 0 && isbn) {
                matchHtml = `<div class="match-info-row">❌ 未找到书号「${escapeHtml(isbn)}」的订单匹配数据</div>`;
            } else if(matchDataSource.length === 0) {
                matchHtml = `<div class="match-info-row">⚠️ 未导入订单表，请先点击上方“导入订单表”</div>`;
            }
        }
        
        // 重复提示
        const duplicateBook = checkDuplicateInCurrentPackage(isbn, pkg);
        if(duplicateBook) {
            duplicateHtml = `<div class="match-info-row">⚠️ 当前包中已存在该书号，共 ${duplicateBook.copies} 本，已高亮该行。</div>`;
        }
        
        const finalHtml = matchHtml + duplicateHtml;
        if(finalHtml) {
            dom.matchInfoDiv.style.display = 'flex';
            dom.matchInfoDiv.innerHTML = finalHtml;
        } else {
            dom.matchInfoDiv.style.display = 'none';
            dom.matchInfoDiv.innerHTML = '';
        }
    }
    
    // 当书号输入框内容变化或按回车时，执行检测、高亮、滚动
    function handleBookIdChange() {
        const bookId = dom.bookIdInput.value.trim();
        const packageNo = dom.packageNoInput.value.trim();
        if(!bookId) {
            clearDuplicateHighlight();
            updateInfoPanel();
            return;
        }
        const existing = checkDuplicateInCurrentPackage(bookId, packageNo);
        if(existing) {
            const row = document.querySelector(`#entryTbody tr[data-package="${escapeAttr(packageNo)}"][data-isbn="${escapeAttr(bookId)}"]`);
            if(row) {
                highlightDuplicateRow(row);
                scrollToRow(row);
            } else {
                setTimeout(() => {
                    const row2 = document.querySelector(`#entryTbody tr[data-package="${escapeAttr(packageNo)}"][data-isbn="${escapeAttr(bookId)}"]`);
                    if(row2) { highlightDuplicateRow(row2); scrollToRow(row2); }
                }, 50);
            }
        } else {
            clearDuplicateHighlight();
        }
        updateInfoPanel();
    }
    
    // 渲染表格（保留data属性）
    function renderTable() {
        const tbody = dom.tbody();
        if(!tbody) return;
        if(books.length === 0) { tbody.innerHTML = '<tr><td colspan="8">暂无数据，请扫码录入或导入文件</td></tr>'; updateTotalStats(); clearDuplicateHighlight(); updateInfoPanel(); return; }
        let html = '';
        books.forEach((b, idx) => {
            const code = (b.price || 0) * b.copies;
            html += `<tr data-idx="${idx}" data-package="${escapeAttr(b.packageNo)}" data-isbn="${escapeAttr(b.bookId)}">
                <td style="text-align:center">${idx+1}</td>
                <td style="text-align:center">${escapeHtml(b.packageNo||'')}</td>
                <td style="text-align:left">${escapeHtml(b.bookId)}</td>
                <td style="text-align:left">${escapeHtml(b.title||'')}</td>
                <td style="text-align:center">${b.price!=null ? b.price.toFixed(2) : ''}</td>
                <td style="text-align:center"><input type="number" class="inline-copies" data-id="${b.id}" value="${b.copies}" min="1" max="9999" style="width:65px; padding:3px;"></td>
                <td style="text-align:right">${code.toFixed(2)}</td>
                <td style="text-align:center"><button class="delete-btn" data-id="${b.id}">删除</button></td>
              </tr>`;
        });
        tbody.innerHTML = html;
        updateTotalStats();
        // 内联修改
        document.querySelectorAll('#entryTbody .inline-copies').forEach(inp => {
            inp.onchange = (e) => {
                let v = parseInt(e.target.value);
                if(isNaN(v) || v<1) v = 1;
                if(v>9999) v = 9999;
                const id = parseInt(inp.dataset.id);
                const book = books.find(b => b.id === id);
                if(book) { book.copies = v; saveToLocal(); renderTable(); }
            };
        });
        document.querySelectorAll('#entryTbody .delete-btn').forEach(btn => {
            btn.onclick = () => {
                const id = parseInt(btn.dataset.id);
                const book = books.find(b=>b.id===id);
                if(confirm(`确定删除「${book.bookId}」(${book.title||'无书名'}) 吗？`)) {
                    books = books.filter(b=>b.id !== id);
                    saveToLocal();
                    renderTable();
                    handleBookIdChange();
                }
            };
        });
        // 重新应用高亮
        handleBookIdChange();
    }
    
    function scrollToBottom() { const wrap = document.querySelector('.table-wrap'); if(wrap) wrap.scrollTop = wrap.scrollHeight; }
    
    // 添加/合并逻辑（供添加按钮和回车调用）
    function performAddOrMerge(bookId, copies, packageNo, title, price) {
        const existing = books.find(b => b.packageNo === packageNo && b.bookId === bookId);
        if(existing) {
            const userConfirmed = confirm(`当前包已存在该书号，现有 ${existing.copies} 本。是否叠加 ${copies} 本？\n点是则累加，点否则取消操作。`);
            if(userConfirmed) {
                existing.copies += copies;
                if(title && title.trim()) existing.title = title.trim();
                if(price !== null && !isNaN(price)) existing.price = parseFloat(price);
                saveToLocal();
                renderTable();
                showTip(`叠加成功，现有 ${existing.copies} 本`, false, 1500);
                scrollToBottom();
                return true;
            } else {
                showTip(`已取消叠加操作`, true, 1500);
                return false;
            }
        } else {
            books.push({
                id: nextId++,
                bookId: bookId.trim(),
                copies: copies,
                packageNo: packageNo,
                title: title || '',
                price: (price !== null && !isNaN(price)) ? parseFloat(price) : null
            });
            saveToLocal();
            renderTable();
            scrollToBottom();
            return true;
        }
    }
    
    // ========== 匹配库导入（增强订数识别） ==========
    function importMatchSource(file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            let records = [];
            const isExcel = file.name.match(/\.(xlsx|xls)$/i);
            try {
                if(isExcel) {
                    const data = new Uint8Array(e.target.result);
                    const wb = XLSX.read(data, { type: 'array' });
                    const sheet = wb.Sheets[wb.SheetNames[0]];
                    const json = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
                    if(!json || json.length<2) throw new Error("文件至少需要表头+数据");
                    const headers = json[0].map(h=>String(h||"").trim());
                    const getIdx = (keywords) => headers.findIndex(h => keywords.some(kw => h.toLowerCase().includes(kw)));
                    const isbnIdx = getIdx(['isbn','书号','isbn号','isbn13']);
                    const titleIdx = getIdx(['书名','名称','title','品名']);
                    const priceIdx = getIdx(['定价','价格','price','码洋']);
                    const qtyIdx = getIdx(['订数','册数','数量','本数','订量','qty','copies']);
                    if(isbnIdx === -1 || titleIdx === -1) throw new Error("缺失书号或书名列");
                    for(let i=1;i<json.length;i++) {
                        const row = json[i];
                        let isbn = row[isbnIdx] ? String(row[isbnIdx]).trim() : "";
                        if(!isbn) continue;
                        let title = row[titleIdx] ? String(row[titleIdx]).trim() : "";
                        let price = (priceIdx !== -1 && row[priceIdx]) ? parseFloat(row[priceIdx]) : null;
                        if(isNaN(price)) price = null;
                        let qty = (qtyIdx !== -1 && row[qtyIdx]) ? parseInt(row[qtyIdx]) : null;
                        if(isNaN(qty)) qty = null;
                        records.push({ isbn, title, price, qty });
                    }
                } else {
                    let content = e.target.result;
                    if(content.charCodeAt(0) === 0xFEFF) content = content.slice(1);
                    const lines = content.split(/\r?\n/);
                    if(lines.length < 2) throw new Error("CSV至少包含表头");
                    const headers = lines[0].split(',').map(s=>s.replace(/^"|"$/g,'').trim());
                    const getIdx = (keywords) => headers.findIndex(h => keywords.some(kw => h.toLowerCase().includes(kw)));
                    const isbnIdx = getIdx(['isbn','书号']);
                    const titleIdx = getIdx(['书名','名称']);
                    const priceIdx = getIdx(['定价','价格']);
                    const qtyIdx = getIdx(['订数','册数','数量','本数','订量']);
                    if(isbnIdx===-1 || titleIdx===-1) throw new Error("缺失书号或书名列");
                    for(let i=1;i<lines.length;i++) {
                        if(!lines[i].trim()) continue;
                        let row=[], inQuote=false,cur='';
                        for(let ch of lines[i]) {
                            if(ch === '"') inQuote = !inQuote;
                            else if(ch === ',' && !inQuote) { row.push(cur); cur=''; }
                            else cur += ch;
                        }
                        row.push(cur);
                        let isbn = row[isbnIdx] ? String(row[isbnIdx]).trim() : "";
                        if(!isbn) continue;
                        let title = row[titleIdx] ? String(row[titleIdx]).trim() : "";
                        let price = (priceIdx !== -1 && row[priceIdx]) ? parseFloat(row[priceIdx]) : null;
                        if(isNaN(price)) price = null;
                        let qty = (qtyIdx !== -1 && row[qtyIdx]) ? parseInt(row[qtyIdx]) : null;
                        if(isNaN(qty)) qty = null;
                        records.push({ isbn, title, price, qty });
                    }
                }
                if(records.length === 0) throw new Error("未找到有效匹配数据");
                matchDataSource = records;
                matchSourceFileName = file.name;

    // 通用导入导出
    function importExcel(file) { processImport(file, 'xlsx'); }
    function importCSV(file) { processImport(file, 'csv'); }
    function processImport(file, type) {
        const reader = new FileReader();
        reader.onload = function(e) {
            let records = [];
            try {
                if(type==='xlsx') {
                    const data = new Uint8Array(e.target.result);
                    const wb = XLSX.read(data,{type:'array'});
                    const sheet = wb.Sheets[wb.SheetNames[0]];
                    const json = XLSX.utils.sheet_to_json(sheet,{header:1,defval:""});
                    if(json.length<2) throw new Error("至少需要表头+数据");
                    const headers=json[0].map(h=>String(h||"").trim());
                    const getIdx = (kwList) => headers.findIndex(h=>kwList.some(kw=>h.toLowerCase().includes(kw)));
                    const isbnIdx=getIdx(['isbn','书号']), titleIdx=getIdx(['书名']), priceIdx=getIdx(['定价']), qtyIdx=getIdx(['本数','册数','数量']), packIdx=getIdx(['包号']);
                    if(isbnIdx===-1||titleIdx===-1||priceIdx===-1||qtyIdx===-1) throw new Error("缺失必要列(书号/书名/定价/本数)");
                    for(let i=1;i<json.length;i++) {
                        const row=json[i]; if(!row[isbnIdx]) continue;
                        let isbn=String(row[isbnIdx]).trim(), title=String(row[titleIdx]).trim(), price=parseFloat(row[priceIdx]), qty=parseInt(row[qtyIdx]);
                        if(isNaN(price)) price=0; if(isNaN(qty)) qty=0; if(price<=0||qty<=0) continue;
                        let pack=(packIdx!==-1&&row[packIdx])?String(row[packIdx]).trim():"1";
                        records.push({ bookId:isbn, copies:qty, packageNo:pack, title, price });
                    }
                } else {
                    let content = e.target.result;
                    if(content.charCodeAt(0)===0xFEFF) content=content.slice(1);
                    const lines=content.split(/\r?\n/); if(lines.length<2) throw new Error("无数据");
                    const headers=lines[0].split(',').map(s=>s.replace(/^"|"$/g,'').trim());
                    const getIdx=(kwList)=>headers.findIndex(h=>kwList.some(kw=>h.toLowerCase().includes(kw)));
                    const isbnIdx=getIdx(['isbn','书号']), titleIdx=getIdx(['书名']), priceIdx=getIdx(['定价']), qtyIdx=getIdx(['本数','册数','数量']), packIdx=getIdx(['包号']);
                    if(isbnIdx===-1||titleIdx===-1||priceIdx===-1||qtyIdx===-1) throw new Error("缺失必要列");
                    for(let i=1;i<lines.length;i++) {
                        if(!lines[i].trim()) continue;
                        let row=[], inQuote=false,cur='';
                        for(let ch of lines[i]){ if(ch==='"') inQuote=!inQuote; else if(ch===','&&!inQuote){ row.push(cur); cur=''; } else cur+=ch; }
                        row.push(cur);
                        let isbn=row[isbnIdx]?String(row[isbnIdx]).trim():""; if(!isbn) continue;
                        let title=row[titleIdx]?String(row[titleIdx]).trim():"";
                        let price=parseFloat(row[priceIdx]); if(isNaN(price)) price=0;
                        let qty=parseInt(row[qtyIdx]); if(isNaN(qty)) qty=0;
                        if(price<=0||qty<=0) continue;
                        let pack=(packIdx!==-1&&row[packIdx])?String(row[packIdx]).trim():"1";
                        records.push({ bookId:isbn, copies:qty, packageNo:pack, title, price });
                    }
                }
                for(let rec of records) {
                    performAddOrMerge(rec.bookId, rec.copies, rec.packageNo, rec.title, rec.price);
                }
                showTip(`导入处理完成`, false);
                scrollToBottom();
            } catch(err) { alert("导入失败: "+err.message); }
        };
        if(type==='xlsx') reader.readAsArrayBuffer(file);
        else reader.readAsText(file,'UTF-8');
    }
    function exportExcel() { if(!books.length){ alert("无数据"); return; } const sheet=[["序号","包号","书号","书名","定价","本数","码洋"]]; books.forEach((b,i)=>{ const code=(b.price||0)*b.copies; sheet.push([i+1,b.packageNo||'',b.bookId,b.title||'',b.price?.toFixed(2)||'',b.copies,code.toFixed(2)]); }); const ws=XLSX.utils.aoa_to_sheet(sheet); const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,"图书录入"); XLSX.writeFile(wb,`图书录入_${Date.now()}.xlsx`); showTip("导出Excel成功"); }
    function exportCSV() { if(!books.length){ alert("无数据"); return; } const rows=[["序号","包号","书号","书名","定价","本数","码洋"]]; books.forEach((b,i)=>{ const code=(b.price||0)*b.copies; rows.push([i+1,b.packageNo||'',b.bookId,b.title||'',b.price?.toFixed(2)||'',b.copies,code.toFixed(2)]); }); const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\r\n"); const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"}); saveAs(blob,`图书录入_${Date.now()}.csv`); showTip("导出CSV成功"); }

        document.getElementById('exportCsvBtn').onclick = exportCSV;
        document.getElementById('clearEntryBtn').onclick = clearAll;
        dom.loadMatchBtn.onclick = () => { let inp = document.createElement('input'); inp.type='file'; inp.accept='.xlsx,.xls,.csv'; inp.onchange=e=>{if(e.target.files.length) importMatchSource(e.target.files[0]);}; inp.click(); };
        dom.viewMatchTableBtn.onclick = showMatchDetailModal;
        updatePackStatsUI();
    }
    init();
})();
</script>
</body>
