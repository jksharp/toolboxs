<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>武汉市新华书店·集团供应中心绩效考核系统</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #eef2ff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 登录界面 */
        .login-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0b3b5f;
            z-index: 1000;
        }
        .login-card {
            background: white;
            border-radius: 32px;
            padding: 40px 32px;
            width: 380px;
            text-align: center;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
        }
        .login-card h2 {
            color: #0b3b5f;
            margin-bottom: 8px;
        }
        .login-card input {
            width: 100%;
            padding: 12px;
            margin: 12px 0;
            border-radius: 40px;
            border: 1px solid #cbd5e1;
        }
        .login-card button {
            width: 100%;
            background: #1e5a7d;
            color: white;
            padding: 12px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }
        .login-card .copyright {
            margin-top: 20px;
            font-size: 0.7rem;
            color: #64748b;
        }

        /* 主应用 */
        .main-app {
            display: none;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .top-nav {
            background: #0b3b5f;
            padding: 8px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            border-bottom: 3px solid #ffc107;
            flex-shrink: 0;
        }
        .top-nav h2 {
            font-size: 1.1rem;
        }
        .user-area {
            display: flex;
            gap: 16px;
            align-items: center;
        }
        button {
            background: #1e5a7d;
            color: white;
            border: none;
            padding: 4px 12px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.75rem;
        }
        button.small { padding: 2px 8px; font-size: 0.7rem; }
        button.danger { background: #dc2626; }
        button.warning { background: #f59e0b; }
        .app-body {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }
        .sidebar {
            width: 240px;
            background: #0f2b3d;
            color: #e0e7ff;
            padding: 16px 0;
            transition: width 0.2s;
            overflow-y: auto;
            flex-shrink: 0;
        }
        .sidebar.collapsed { width: 0; padding: 0; overflow: hidden; }
        .menu-item {
            padding: 8px 20px;
            margin: 4px 12px;
            border-radius: 40px;
            cursor: pointer;
            white-space: nowrap;
            font-size: 0.85rem;
        }
        .menu-item.active { background: #1e5a7d; color: white; }
        .menu-item:hover:not(.active) { background: #1e4a6e; }
        .collapse-trigger {
            width: 5px;
            background: #3b82f6;
            cursor: pointer;
            transition: background 0.2s;
            flex-shrink: 0;
            opacity: 0.7;
        }

        }
        .main-panel {
            flex: 1;

        .footer-bar {

        .footer-left, .footer-right {

        }
        .footer-center {
            flex: 1;
            text-align: center;
        }
        .footer-center .copyright {
            color: #ffc107;
        }
        .page-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #0b3b5f;
            border-left: 4px solid #ffc107;
            padding-left: 14px;
            margin-bottom: 12px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 12px 16px;
            margin-bottom: 16px;

        .flex-between {
            display: flex;
            justify-content: space-between;

            flex-wrap: wrap;

            margin-bottom: 10px;
        }
        .filter-bar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 10px;
        }
        .filter-bar select, .filter-bar input {
            padding: 4px 10px;
            border-radius: 40px;
            border: 1px solid #cbd5e1;
            background: white;
            font-size: 0.75rem;
        }
        .table-wrapper {
            overflow-x: auto;
            overflow-y: auto;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            max-height: calc(100vh - 200px);
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.75rem;
            min-width: 800px;
        }
        .data-table th, .data-table td {
            border: 1px solid #cbd5e1;
            padding: 4px 4px;
            text-align: center;
            background: white;
            white-space: nowrap;
        }
        .data-table th {
            background: #eef2ff;

            padding: 6px 4px;
        }
        .readonly-cell {
            background: #f8fafc;
            cursor: pointer;
            display: inline-block;
            padding: 2px 6px;
            border-radius: 12px;
            min-width: 40px;
        }
        .editable-input {
            width: 60px;
            text-align: center;

            border: 1px solid #3b82f6;
            padding: 2px;
            font-size: 0.7rem;
        }
        .badge {
            background: #e6f7ff;
            padding: 2px 8px;
            border-radius: 40px;
            font-size: 0.65rem;
        }
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;

        .modal-content {

        .form-group {

        .form-group label {

            margin-bottom: 4px;
            font-size: 0.8rem;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;

            border-radius: 40px;

        }
        .big-number {
            font-size: 1rem;
            font-weight: bold;
            margin: 0 2px;
        }
        .action-bar {
            margin-top: 10px;
            display: flex;
            justify-content: flex-end;

        }
        .month-badge {
            font-size: 0.9rem;
            background: #e6f7ff;
            display: inline-block;
            padding: 2px 12px;
            border-radius: 40px;
        }
        .multi-month-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            margin-bottom: 10px;
        }
        .multi-month-group label {
            background: #eef2ff;
            padding: 2px 8px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.7rem;
        }
        .storage-switch {
            margin-bottom: 12px;
            padding: 8px;
            background: #f8fafc;
            border-radius: 40px;
            display: flex;
            gap: 16px;
            align-items: center;
        }
        .storage-switch label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
<div class="login-container" id="loginContainer">
    <div class="login-card">
        <h2>📚 武汉市新华书店集团</h2>
        <p>集团供应中心 · 绩效考核系统</p>
        <input type="text" id="loginUsername" placeholder="用户编号">
        <input type="password" id="loginPassword" placeholder="密码">
        <button id="loginBtn">登录</button>
        <div class="copyright">© 武汉市新华书店 集团供应中心</div>
    </div>
</div>

<div class="main-app" id="mainApp">
    <div class="top-nav">
        <div><h2>📖 武汉市新华书店 · 集团供应中心</h2></div>
        <div class="user-area"><span>欢迎，<span id="currentUserName"></span></span><button id="logoutBtn">退出</button></div>
    </div>
    <div class="app-body">
        <div class="sidebar" id="sidebar">
            <div class="menu-item active" data-page="project">📐 绩效项目</div>
            <div class="menu-item" data-page="monthsConfig">📆 考核月份</div>
            <div class="menu-item" data-page="performance">📊 绩效考核</div>
            <div class="menu-item" data-page="rewards">🏅 奖惩记录</div>
            <div class="menu-item" data-page="statistics">📈 绩效统计</div>
            <div class="menu-item" data-page="users">👥 用户管理</div>
            <div class="menu-item" data-page="backup">💾 数据维护</div>
        </div>
        <div class="collapse-trigger" id="collapseTrigger"></div>
        <div class="main-panel" id="mainPanel"></div>
    </div>
    <div class="footer-bar">
        <div class="footer-left">当前用户：<span id="footerUserName"></span></div>
        <div class="footer-center"><span class="copyright">© 武汉市新华书店 集团供应中心 2026</span></div>
        <div class="footer-right">当前日期：<span id="footerDate"></span></div>
    </div>
</div>

<script>
    // ======================== 数据服务抽象层 ========================
    class DataService {
        async getItems() { throw new Error("Not implemented"); }
        async setItems(items) {}
        async getMonthList() { throw new Error("Not implemented"); }
        async setMonthList(monthList) {}
        async getMonthsData() { throw new Error("Not implemented"); }
        async setMonthsData(monthsData) {}
        async getPersons() { throw new Error("Not implemented"); }
        async setPersons(persons) {}
        async getGroups() { throw new Error("Not implemented"); }
        async setGroups(groups) {}
        async getUsers() { throw new Error("Not implemented"); }
        async setUsers(users) {}
        async getLogs() { throw new Error("Not implemented"); }
        async setLogs(logs) {}
        async getCurMonthId() { throw new Error("Not implemented"); }
        async setCurMonthId(curMonthId) {}
    }

    // LocalStorage 实现（完整存储所有数据）
    class LocalStorageService extends DataService {
        async getItems() { return JSON.parse(localStorage.getItem("perf_items") || "[]"); }
        async setItems(items) { localStorage.setItem("perf_items", JSON.stringify(items)); }
        async getMonthList() { return JSON.parse(localStorage.getItem("perf_monthList") || "[]"); }
        async setMonthList(monthList) { localStorage.setItem("perf_monthList", JSON.stringify(monthList)); }
        async getMonthsData() { return JSON.parse(localStorage.getItem("perf_monthsData") || "{}"); }
        async setMonthsData(monthsData) { localStorage.setItem("perf_monthsData", JSON.stringify(monthsData)); }
        async getPersons() { return JSON.parse(localStorage.getItem("perf_persons") || "[]"); }
        async setPersons(persons) { localStorage.setItem("perf_persons", JSON.stringify(persons)); }
        async getGroups() { return JSON.parse(localStorage.getItem("perf_groups") || "[]"); }
        async setGroups(groups) { localStorage.setItem("perf_groups", JSON.stringify(groups)); }
        async getUsers() { return JSON.parse(localStorage.getItem("perf_users") || "[]"); }
        async setUsers(users) { localStorage.setItem("perf_users", JSON.stringify(users)); }
        async getLogs() { return JSON.parse(localStorage.getItem("perf_logs") || "[]"); }
        async setLogs(logs) { localStorage.setItem("perf_logs", JSON.stringify(logs)); }
        async getCurMonthId() { return localStorage.getItem("perf_curMonthId") || ""; }
        async setCurMonthId(curMonthId) { localStorage.setItem("perf_curMonthId", curMonthId); }
        async loadAll() {
            return {
                items: await this.getItems(),
                monthList: await this.getMonthList(),
                monthsData: await this.getMonthsData(),
                persons: await this.getPersons(),
                groups: await this.getGroups(),
                users: await this.getUsers(),
                logs: await this.getLogs(),
                curMonthId: await this.getCurMonthId()
            };
        }
        async saveAll(data) {
            await this.setItems(data.items);
            await this.setMonthList(data.monthList);
            await this.setMonthsData(data.monthsData);
            await this.setPersons(data.persons);
            await this.setGroups(data.groups);
            await this.setUsers(data.users);
            await this.setLogs(data.logs);
            await this.setCurMonthId(data.curMonthId);
        }
    }

    // D1 HTTP API 服务 (通过 fetch 调用后端代理，您需要部署一个简单的后端来转发请求到 D1)
    // API 端点示例：假设您的后端地址为 /api/d1，支持 POST 请求，body 中包含 action 和 data
    // 这里提供一个通用实现，您需要根据实际后端接口调整
    class D1Service extends DataService {
        constructor(apiUrl = "/api/d1") {
            super();
            this.apiUrl = apiUrl;
        }
        async request(action, data) {
            const res = await fetch(this.apiUrl, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ action, data })
            });
            if (!res.ok) throw new Error(`D1 API error: ${res.status}`);
            const result = await res.json();
            if (!result.success) throw new Error(result.error || "Unknown error");
            return result.data;
        }
        async getItems() { return await this.request("getItems"); }
        async setItems(items) { await this.request("setItems", items); }
        async getMonthList() { return await this.request("getMonthList"); }
        async setMonthList(monthList) { await this.request("setMonthList", monthList); }
        async getMonthsData() { return await this.request("getMonthsData"); }
        async setMonthsData(monthsData) { await this.request("setMonthsData", monthsData); }
        async getPersons() { return await this.request("getPersons"); }
        async setPersons(persons) { await this.request("setPersons", persons); }
        async getGroups() { return await this.request("getGroups"); }
        async setGroups(groups) { await this.request("setGroups", groups); }
        async getUsers() { return await this.request("getUsers"); }
        async setUsers(users) { await this.request("setUsers", users); }
        async getLogs() { return await this.request("getLogs"); }
        async setLogs(logs) { await this.request("setLogs", logs); }
        async getCurMonthId() { return await this.request("getCurMonthId"); }
        async setCurMonthId(curMonthId) { await this.request("setCurMonthId", curMonthId); }
        async loadAll() {
            return {
                items: await this.getItems(),
                monthList: await this.getMonthList(),
                monthsData: await this.getMonthsData(),
                persons: await this.getPersons(),
                groups: await this.getGroups(),
                users: await this.getUsers(),
                logs: await this.getLogs(),
                curMonthId: await this.getCurMonthId()
            };
        }
        async saveAll(data) {
            await this.setItems(data.items);
            await this.setMonthList(data.monthList);
            await this.setMonthsData(data.monthsData);
            await this.setPersons(data.persons);
            await this.setGroups(data.groups);
            await this.setUsers(data.users);
            await this.setLogs(data.logs);
            await this.setCurMonthId(data.curMonthId);
        }
    }

    // ======================== 全局应用状态 ========================
    let App = {
        service: null,
        items: [],
        monthList: [],
        monthsData: {},
        persons: [],
        groups: [],
        users: [],
        logs: [],
        curMonthId: "",
        curUser: null,
        curPage: "project",
        cats: [{ id: "virtue", name: "德", order: 1 }, { id: "ability", name: "能", order: 2 }, { id: "diligence", name: "勤", order: 3 }],
        pendingChanges: []  // 用于绩效考核页面暂存修改
    };

    // 辅助函数
    function getCatName(catId) { let c = App.cats.find(c => c.id === catId); return c ? c.name : ""; }
    function getPersonName(id) { let p = App.persons.find(p => p.id === id); return p ? p.name : ""; }
    function getAllEmpIds() { return App.persons.map(p => p.id); }
    function canEdit(empId) {
        if (!App.curUser) return false;
        if (App.curUser.role === "系统管理员" || App.curUser.role === "经理") return true;
        if (App.curUser.role === "主任") {
            let curPerson = App.persons.find(p => p.name === App.curUser.realName);
            if (!curPerson || curPerson.position !== "主任") return false;
            let target = App.persons.find(p => p.id === empId);
            return target && target.position === "员工" && target.groupId === curPerson.groupId;
        }
        return false;
    }

    // 月份管理
    function createMonth(monthId, name, year, quarter, srcId = null) {
        let src = srcId && App.monthsData[srcId] ? App.monthsData[srcId] : null;
        let itemsSnap = src ? JSON.parse(JSON.stringify(src.items)) : JSON.parse(JSON.stringify(App.items));
        let counts = {}, leaderScores = {};
        for (let e of getAllEmpIds()) {
            let ec = {};
            for (let i of itemsSnap) ec[i.id] = src ? (src.counts[e]?.[i.id] || 0) : 0;
            counts[e] = ec;
            leaderScores[e] = src ? (src.leaderScores[e] || 0) : 0;
        }
        App.monthsData[monthId] = { items: itemsSnap, counts, leaderScores };
        App.monthList.push({ id: monthId, name, year, quarter });
    }

    function calcAdjust(eid, monthId) {
        let m = App.monthsData[monthId];
        if (!m) return 0;
        let sum = 0;
        for (let i of m.items) sum += (m.counts[eid]?.[i.id] || 0) * i.perScore;
        return sum;
    }

    function getTotalScore(eid, monthId) {
        let adj = calcAdjust(eid, monthId);
        let leader = App.monthsData[monthId]?.leaderScores[eid] || 0;
        let total = 80 + adj + leader;
        return Math.min(Math.max(total, 0), 100);
    }

    // 数据初始化
    function initDefaultItems() {
        App.items = [
            { id: "i1", cat: "virtue", name: "职业道德", perScore: 2 },
            { id: "i2", cat: "virtue", name: "廉洁自律", perScore: -2 },
            { id: "i3", cat: "ability", name: "业务技能", perScore: 3 },
            { id: "i4", cat: "ability", name: "创新意识", perScore: 5 },
            { id: "i5", cat: "diligence", name: "迟到早退", perScore: -3 },
            { id: "i6", cat: "diligence", name: "全勤奖励", perScore: 5 },
            { id: "i7", cat: "diligence", name: "加班奉献", perScore: 4 }
        ];
    }

    function initDefaultMonths() {
        if (App.monthList.length === 0) {
            for (let i = 1; i <= 12; i++) {
                let mName = `2026-${String(i).padStart(2, '0')}`;
                let quarter = Math.ceil(i / 3).toString();
                createMonth("m" + i, mName, "2026", quarter);
            }
            App.curMonthId = App.monthList[0].id;
        }
    }

    function initDefaultPersonsAndGroups() {
        App.groups = [
            { id: "g1", name: "馆配组" }, { id: "g2", name: "教材组" }, { id: "g3", name: "收发组" }
        ];
        App.persons = [
            { id: "p2", name: "张建国", groupId: "g1", position: "主任" }, { id: "p3", name: "张莉", groupId: "g1", position: "员工" },
            { id: "p4", name: "李强", groupId: "g1", position: "员工" }, { id: "p5", name: "陈敏", groupId: "g1", position: "员工" },
            { id: "p6", name: "赵敏", groupId: "g1", position: "员工" }, { id: "p7", name: "刘卫东", groupId: "g2", position: "主任" },
            { id: "p8", name: "孙丽", groupId: "g2", position: "员工" }, { id: "p9", name: "周华", groupId: "g2", position: "员工" },
            { id: "p10", name: "吴迪", groupId: "g2", position: "员工" }, { id: "p11", name: "郑爽", groupId: "g2", position: "员工" },
            { id: "p12", name: "徐红", groupId: "g3", position: "主任" }, { id: "p13", name: "林晨", groupId: "g3", position: "员工" },
            { id: "p14", name: "郭峰", groupId: "g3", position: "员工" }, { id: "p15", name: "唐雅", groupId: "g3", position: "员工" },
            { id: "p16", name: "宋阳", groupId: "g3", position: "员工" }
        ];
    }

    function initDefaultUsers() {
        App.users = [
            { no: "admin", pwd: "admin", role: "系统管理员", realName: "系统管理员", empId: null },
            { no: "1000", pwd: "1000", role: "总经理", realName: "陈新华", empId: "p1" }
        ];
        let next = 1001;
        for (let p of App.persons) {
            if (!App.users.find(u => u.empId === p.id)) {
                let role = p.position === "经理" ? "经理" : (p.position === "主任" ? "主任" : "员工");
                App.users.push({ no: String(next++), pwd: String(next-1), role: role, realName: p.name, empId: p.id });
            }
        }
    }

    function initDefaultLogs() {
        App.logs = [];
        let reasons = ["迟到1次", "全勤奖励", "创新建议采纳", "工作失误", "加班贡献", "客户表扬", "内部协作优秀", "违反流程", "廉洁自律表扬", "技能比武获奖"];
        for (let i = 0; i < 30; i++) {
            let emp = App.persons[i % App.persons.length];
            let monthIdx = i % App.monthList.length;
            let monthId = App.monthList[monthIdx].id;
            let items = App.monthsData[monthId].items;
            let item = items[i % items.length];
            let score = item.perScore;
            let ts = `2026-${String(monthIdx+1).padStart(2,'0')}-15 00:00:00`;
            App.logs.push({
                id: Date.now() + i, employeeId: emp.id, employeeName: emp.name,
                itemId: item.id, itemName: item.name,
                changeValue: score, oldValue: 0, newValue: score,
                reason: reasons[i % reasons.length], timestamp: ts, monthKey: monthId
            });
            App.monthsData[monthId].counts[emp.id][item.id] = (App.monthsData[monthId].counts[emp.id][item.id] || 0) + 1;
        }
    }

    async function initAppData() {
        // 加载核心数据（items, monthList, monthsData, curMonthId）
        App.items = await App.service.getItems();
        App.monthList = await App.service.getMonthList();
        App.monthsData = await App.service.getMonthsData();
        App.curMonthId = await App.service.getCurMonthId();
        // 如果为空则初始化默认
        if (App.items.length === 0) initDefaultItems();
        if (App.monthList.length === 0) initDefaultMonths();
        if (!App.curMonthId || !App.monthsData[App.curMonthId]) App.curMonthId = App.monthList[0]?.id || "";
        // 加载其他数据，如果没有则初始化
        let persons = await App.service.getPersons();
        let groups = await App.service.getGroups();
        let users = await App.service.getUsers();
        let logs = await App.service.getLogs();
        if (persons.length === 0) initDefaultPersonsAndGroups();
        else { App.persons = persons; App.groups = groups; }
        if (users.length === 0) initDefaultUsers();
        else App.users = users;
        if (logs.length === 0) initDefaultLogs();
        else App.logs = logs;
        // 同步保存所有数据到服务（确保一致性）
        await saveAllToService();
    }

    async function saveAllToService() {
        await App.service.saveAll({
            items: App.items,
            monthList: App.monthList,
            monthsData: App.monthsData,
            persons: App.persons,
            groups: App.groups,
            users: App.users,
            logs: App.logs,
            curMonthId: App.curMonthId
        });
    }

    // 工具栏函数
    function exportExcel(data, filename) {
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Sheet1");
        XLSX.writeFile(wb, filename);
    }
    function importExcel(file, callback) {
        let reader = new FileReader();
        reader.onload = e => {
            let wb = XLSX.read(new Uint8Array(e.target.result), { type: "array" });
            let ws = wb.Sheets[wb.SheetNames[0]];
            callback(XLSX.utils.sheet_to_json(ws));
        };
        reader.readAsArrayBuffer(file);
    }

    // 绩效考核暂存相关
    function addPendingChange(type, empId, itemId, oldVal, newVal) {
        App.pendingChanges.push({ type, monthId: App.curMonthId, empId, itemId, oldVal, newVal });
    }
    function clearPendingChanges() { App.pendingChanges = []; }
    function getLogTimestamp(monthId) {
        let month = App.monthList.find(m => m.id === monthId);
        if (!month) return new Date().toISOString().slice(0,19).replace('T',' ');
        let parts = month.name.split('-');
        if (parts.length === 2) return `${parts[0]}-${parts[1]}-15 00:00:00`;
        return new Date().toISOString().slice(0,19).replace('T',' ');
    }
    async function applyPendingChanges() {
        for (let ch of App.pendingChanges) {
            let month = App.monthsData[ch.monthId];
            if (!month) continue;
            if (ch.type === 'count') {
                month.counts[ch.empId][ch.itemId] = ch.newVal;
            } else if (ch.type === 'leader') {
                month.leaderScores[ch.empId] = ch.newVal;
            }
        }
        let logTime = getLogTimestamp(App.curMonthId);
        for (let ch of App.pendingChanges) {
            if (ch.type === 'count') {
                let month = App.monthsData[ch.monthId];
                let item = month.items.find(i => i.id === ch.itemId);
                App.logs.unshift({
                    id: Date.now() + Math.random(),
                    employeeId: ch.empId,
                    employeeName: getPersonName(ch.empId),
                    itemId: ch.itemId,
                    itemName: item?.name || '',
                    changeValue: (ch.newVal - ch.oldVal) * (item?.perScore || 0),
                    reason: "绩效考核修改",
                    timestamp: logTime,
                    monthKey: ch.monthId
                });
            } else if (ch.type === 'leader') {
                App.logs.unshift({
                    id: Date.now() + Math.random(),
                    employeeId: ch.empId,
                    employeeName: getPersonName(ch.empId),
                    itemId: "leader",
                    itemName: "绩(领导分)",
                    changeValue: ch.newVal - ch.oldVal,
                    reason: "绩效考核修改",
                    timestamp: logTime,
                    monthKey: ch.monthId
                });
            }
        }
        await saveAllToService();
        clearPendingChanges();
    }

    function attachPerformanceEditEvents() {
        document.querySelectorAll('.readonly-cell').forEach(cell => {
            cell.style.cursor = 'pointer';
            cell.ondblclick = function() {
                let type = cell.dataset.type, eid = cell.dataset.e, iid = cell.dataset.i;
                let oldVal = cell.innerText, input = document.createElement('input');
                input.type = 'number';
                input.value = oldVal; input.classList.add('editable-input');
                cell.innerHTML = ''; cell.appendChild(input); input.focus();
                input.onblur = () => {
                    let newVal = parseInt(input.value) || 0;
                    if (newVal == oldVal) { cell.innerHTML = oldVal; return; }
                    addPendingChange(type, eid, iid, oldVal, newVal);
                    cell.innerHTML = newVal;
                };
            };
        });
    }

        document.getElementById('impRewFile').onchange = e => importExcel(e.target.files[0], async rows => { App.logs = rows; await saveAllToService(); renderLogs(); });

    function openRewardModal(editLog) {
        let isEdit = !!editLog;
        let modal = document.createElement('div'); modal.className = 'modal';
        let monthHtml = `<div class="form-group"><label>生效月份</label><select id="logMonth">${App.monthList.map(m => `<option value="${m.id}" ${m.id===App.curMonthId?'selected':''}>${m.name}</option>`).join('')}</select></div>`;
        let groupedOpts = '';
        for (let cat of App.cats) {
            let catItems = App.items.filter(i => i.cat === cat.id);
            if (catItems.length) {
                groupedOpts += `<optgroup label="${cat.name}类">${catItems.map(i => `<option value="${i.id}">${i.name} (${i.perScore>0?`+${i.perScore}`:i.perScore}分/次)</option>`).join('')}</optgroup>`;
            }
        }
        groupedOpts += `<optgroup label="其他"><option value="leader">绩（领导分0-20）</option></optgroup>`;
        let itemSelect = `<select id="itemSelect" style="width:100%">${groupedOpts}</select>`;
        let leaderDiv = `<div id="leaderDiv" style="display:block"><div class="form-group"><label>领导分（0-20）</label><input type="number" id="leaderScore" min="0" max="20" step="1" value="0"></div></div>`;
        modal.innerHTML = `<div class="modal-content"><h3>${isEdit?'编辑':'新增'}奖惩记录</h3>${monthHtml}<div class="form-group"><label>时间</label><input type="datetime-local" id="logTime" value="${new Date().toISOString().slice(0,16)}"></div><div class="form-group"><label>员工</label><select id="logEmp">${App.persons.map(p => `<option value="${p.id}">${p.name}</option>`).join('')}</select></div><div class="form-group"><label>考核项目</label>${itemSelect}</div>${leaderDiv}<div class="form-group"><label>事由</label><textarea id="logReason" rows="2"></textarea></div><div class="flex-between"><button id="confirmRew">确认</button><button id="cancelRew">取消</button></div></div>`;
        document.body.appendChild(modal);
        let itemSel = document.getElementById('itemSelect');
        itemSel.onchange = () => { let val = itemSel.value; document.getElementById('leaderDiv').style.display = (val === 'leader') ? 'block' : 'none'; };
        if (isEdit) {
            if (editLog.itemId === 'leader') {
                itemSel.value = 'leader';
                document.getElementById('leaderScore').value = editLog.newValue;
            } else {
                itemSel.value = editLog.itemId;
            }
            document.getElementById('logReason').value = editLog.reason;
            document.getElementById('logTime').value = editLog.timestamp.replace(' ', 'T').slice(0,16);
            document.getElementById('logEmp').value = editLog.employeeId;
            document.getElementById('logMonth').value = editLog.monthKey;
        }
        document.getElementById('confirmRew').onclick = async () => {
            let time = document.getElementById('logTime').value.replace('T', ' ') + ':00';
            let empId = document.getElementById('logEmp').value;
            let selVal = itemSel.value;
            let reason = document.getElementById('logReason').value;
            let monthId = document.getElementById('logMonth').value;
            if (!empId || !selVal || !monthId) return;
            let month = App.monthsData[monthId];
            if (!month) { alert("月份数据不存在"); return; }
            let itemId, itemName, change = 0, empName = getPersonName(empId);
            if (selVal === 'leader') {
                itemId = 'leader'; itemName = '绩(领导分)';
                let newLeader = Math.min(20, Math.max(0, parseInt(document.getElementById('leaderScore').value) || 0));
                let oldLeader = month.leaderScores[empId] || 0;
                change = newLeader - oldLeader;
                month.leaderScores[empId] = newLeader;
            } else {
                let it = App.items.find(i => i.id === selVal);
                if (!it) return;
                itemId = it.id; itemName = it.name;
                let delta = parseInt(prompt(`请输入${it.name} 增加/减少的次数（正数为增加）`, "1")) || 0;
                if (delta === 0) { alert("次数变化不能为0"); return; }
                let oldTimes = month.counts[empId]?.[itemId] || 0;
                let newTimes = oldTimes + delta;
                if (newTimes < 0) newTimes = 0;
                month.counts[empId][itemId] = newTimes;
                change = (newTimes - oldTimes) * it.perScore;
            }
            if (isEdit) {
                let old = editLog;
                let oldMonth = App.monthsData[old.monthKey];
                if (old.itemId === 'leader') oldMonth.leaderScores[old.employeeId] = old.oldValue;
                else oldMonth.counts[old.employeeId][old.itemId] = old.oldValue;
                App.logs = App.logs.filter(l => l.id !== old.id);
            }
            App.logs.unshift({ id: Date.now(), employeeId: empId, employeeName: empName, itemId, itemName, changeValue: change, oldValue: 0, newValue: change, reason, timestamp: time, monthKey: monthId });
            await saveAllToService();
            modal.remove();
            await renderRewardsPage(document.getElementById("mainPanel"));
        };
        document.getElementById('cancelRew').onclick = () => modal.remove();
    }

    // 绩效统计页面（多选月份累计）
    async function renderStatisticsPage(container) {
        if (App.monthList.length === 0) { container.innerHTML = `<div class="card">请先在“考核月份”中配置月份</div>`; return; }
        let monthsList = [...App.monthList].sort((a,b)=>a.name.localeCompare(b.name));
        let defaultSelected = monthsList.slice(0, Math.min(6, monthsList.length)).map(m => m.id);
        let checkboxes = `<div class="multi-month-group"><div><button id="selectAllMonths">全选</button> <button id="clearAllMonths">全不选</button></div>${monthsList.map(m => `<label><input type="checkbox" class="monthChk" value="${m.id}" ${defaultSelected.includes(m.id) ? 'checked' : ''}> ${m.name}</label>`).join('')}</div>`;
        let groupFilter = `<select id="statGroup"><option value="all">全部组</option>${App.groups.map(g => `<option value="${g.id}">${g.name}</option>`).join('')}</select>`;
        let posFilter = `<select id="statPos"><option value="all">全部职位</option><option value="主任">主任</option><option value="员工">员工</option></select>`;
        let h = `<div class="page-title">📈 绩效统计（多选月份累计）</div>
        <div class="card">
            <div class="multi-month-group" style="margin-bottom:10px;">${checkboxes}</div>
            <div class="filter-bar" style="justify-content: space-between;">
                <div><span>组筛选：${groupFilter}</span> <span>职位筛选：${posFilter}</span></div>
                <div><button id="exportStatExcel">导出Excel</button></div>
            </div>
            <div class="table-wrapper" id="statTableWrap"></div>
        </div>`;
        container.innerHTML = h;
        function renderStatTable() {
            let selected = Array.from(document.querySelectorAll('.monthChk:checked')).map(cb => cb.value);
            if (selected.length === 0) { document.getElementById('statTableWrap').innerHTML = '<div class="badge">请至少选择一个月份</div>'; return; }
            let groupVal = document.getElementById('statGroup').value, posVal = document.getElementById('statPos').value;
            let filteredPersons = App.persons.filter(p => (groupVal==='all'||p.groupId===groupVal) && (posVal==='all'||p.position===posVal));
            let groupOrder = { g2:0, g1:1, g3:2 };
            let sortedPersons = filteredPersons.sort((a,b) => (groupOrder[a.groupId]??99) - (groupOrder[b.groupId]??99) || a.name.localeCompare(b.name));
            let firstMonth = App.monthsData[selected[0]];
            if (!firstMonth) return;
            let sortedItems = [...firstMonth.items].sort((a,b) => (App.cats.find(c=>c.id===a.cat)?.order||99) - (App.cats.find(c=>c.id===b.cat)?.order||99));
            let thead = `<thead><tr><th>员工</th><th>组</th>${sortedItems.map(i => `<th>${i.name}<br><span class="badge">(${getCatName(i.cat)})<br>累计次数/得分</span></th>`).join('')}<th>累计总分</th><th>累计实发80%</th><th>累计预留20%</th><th>总绩效</th></tr></thead>`;
            let tbody = '';
            for (let p of sortedPersons) {
                let groupName = App.groups.find(g => g.id === p.groupId)?.name || '';
                let row = `<tr><td style="background:#f8fafc;">${p.name}</td><td style="background:#f8fafc;">${groupName}</td>`;
                let totalScore = 0;
                let totalReal = 0;
                let totalReserve = 0;
                for (let item of sortedItems) {
                    let totalTimes = 0, totalItemScore = 0;
                    for (let mid of selected) {
                        let month = App.monthsData[mid];
                        if (month) {
                            let times = month.counts[p.id]?.[item.id] || 0;
                            totalTimes += times;
                            totalItemScore += times * item.perScore;
                        }
                    }
                    row += `<td>${totalTimes} → ${totalItemScore}</td>`;
                    totalScore += totalItemScore;
                }
                let totalLeader = 0;
                for (let mid of selected) {
                    let month = App.monthsData[mid];
                    if (month) totalLeader += month.leaderScores[p.id] || 0;
                }
                totalScore += totalLeader;
                let baseTotal = 80 * selected.length;
                let finalTotal = baseTotal + totalScore;
                finalTotal = Math.min(Math.max(finalTotal, 0), 100 * selected.length);
                for (let mid of selected) {
                    let month = App.monthsData[mid];
                    if (month) {
                        let monthlyScore = 80 + calcAdjust(p.id, mid) + (month.leaderScores[p.id] || 0);
                        monthlyScore = Math.min(Math.max(monthlyScore, 0), 100);
                        let coeff = monthlyScore / 100;
                        let base = 700 * coeff;
                        totalReal += base * 0.8;
                        totalReserve += base * 0.2;
                    }
                }
                row += `<td>${finalTotal.toFixed(1)}</td><td>${totalReal.toFixed(2)}</td><td>${totalReserve.toFixed(2)}</td><td>${(totalReal+totalReserve).toFixed(2)}</td></tr>`;
                tbody += row;
            }
            document.getElementById('statTableWrap').innerHTML = `<table class="data-table">${thead}${tbody}</table>`;
        }
        renderStatTable();
        document.getElementById('selectAllMonths').onclick = () => { document.querySelectorAll('.monthChk').forEach(cb => cb.checked = true); renderStatTable(); };
        document.getElementById('clearAllMonths').onclick = () => { document.querySelectorAll('.monthChk').forEach(cb => cb.checked = false); renderStatTable(); };
        document.querySelectorAll('.monthChk').forEach(cb => cb.onchange = renderStatTable);
        document.getElementById('statGroup').onchange = renderStatTable;
        document.getElementById('statPos').onchange = renderStatTable;
        document.getElementById('exportStatExcel').onclick = () => {
            let selected = Array.from(document.querySelectorAll('.monthChk:checked')).map(cb => cb.value);
            if (selected.length === 0) return;
            let groupVal = document.getElementById('statGroup').value, posVal = document.getElementById('statPos').value;
            let filtered = App.persons.filter(p => (groupVal==='all'||p.groupId===groupVal) && (posVal==='all'||p.position===posVal));
            let firstMonth = App.monthsData[selected[0]];
            let sortedItems = [...firstMonth.items].sort((a,b) => (App.cats.find(c=>c.id===a.cat)?.order||99) - (App.cats.find(c=>c.id===b.cat)?.order||99));
            let data = [];
            for (let p of filtered) {
                let row = { 员工: p.name, 组: App.groups.find(g=>g.id===p.groupId)?.name||'' };
                let totalScore = 0, totalReal = 0, totalReserve = 0;
                for (let item of sortedItems) {
                    let totalTimes = 0;
                    for (let mid of selected) {
                        let month = App.monthsData[mid];
                        if (month) totalTimes += month.counts[p.id]?.[item.id] || 0;
                    }
                    row[`${item.name}_次数`] = totalTimes;
                    let itemScore = totalTimes * item.perScore;
                    row[`${item.name}_得分`] = itemScore;
                    totalScore += itemScore;
                }
                let totalLeader = 0;
                for (let mid of selected) {
                    let month = App.monthsData[mid];
                    if (month) totalLeader += month.leaderScores[p.id] || 0;
                }
                totalScore += totalLeader;
                let baseTotal = 80 * selected.length;
                let finalTotal = baseTotal + totalScore;
                finalTotal = Math.min(Math.max(finalTotal, 0), 100 * selected.length);
                for (let mid of selected) {
                    let month = App.monthsData[mid];
                    if (month) {
                        let monthlyScore = 80 + calcAdjust(p.id, mid) + (month.leaderScores[p.id] || 0);
                        monthlyScore = Math.min(Math.max(monthlyScore, 0), 100);
                        let coeff = monthlyScore / 100;
                        let base = 700 * coeff;
                        totalReal += base * 0.8;
                        totalReserve += base * 0.2;
                    }
                }
                row['累计总分'] = finalTotal.toFixed(1);
                row['累计实发80%'] = totalReal.toFixed(2);
                row['累计预留20%'] = totalReserve.toFixed(2);
                row['总绩效'] = (totalReal+totalReserve).toFixed(2);
                data.push(row);
            }
            exportExcel(data, `绩效统计_累计.xlsx`);
        };
    }

        const container = document.getElementById("mainPanel");
        if (App.curPage === "project") await renderProjectPage(container);
        else if (App.curPage === "monthsConfig") await renderMonthsConfig(container);
        else if (App.curPage === "performance") await renderPerformancePage(container);
        else if (App.curPage === "rewards") await renderRewardsPage(container);
        else if (App.curPage === "statistics") await renderStatisticsPage(container);
        else if (App.curPage === "users") await renderUsersPage(container);
        else if (App.curPage === "backup") await renderBackupPage(container);

    // 登录与菜单绑定
    function initLogin() {
        const username = document.getElementById('loginUsername');
        const password = document.getElementById('loginPassword');
        const loginBtn = document.getElementById('loginBtn');
        username.addEventListener('keypress', (e) => { if (e.key === 'Enter') password.focus(); });
        password.addEventListener('keypress', (e) => { if (e.key === 'Enter') loginBtn.click(); });
        loginBtn.onclick = () => {
            let no = username.value.trim();
            let pwd = password.value;
            let user = App.users.find(u => u.no === no && u.pwd === pwd);
            if (user) {
                App.curUser = user;
                document.getElementById('currentUserName').innerText = user.realName;
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('mainApp').style.display = 'flex';
                render();
            } else alert("用户编号或密码错误");
        };
        document.getElementById('logoutBtn').onclick = () => { App.curUser = null; document.getElementById('loginContainer').style.display = 'flex'; document.getElementById('mainApp').style.display = 'none'; };
    }
    function bindMenu() {
        document.querySelectorAll('.menu-item').forEach(item => item.addEventListener('click', () => {
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            item.classList.add('active');
            App.curPage = item.dataset.page;
            render();
        }));
    }
    function initCollapse() {
        document.getElementById('collapseTrigger').onclick = () => document.getElementById('sidebar').classList.toggle('collapsed');
    }

    // 启动应用
    (async () => {
        // 默认使用 LocalStorage 服务，如需 D1 请取消注释并配置正确的 API 地址
        App.service = new LocalStorageService();
        // App.service = new D1Service("/api/d1");
        await initAppData();
        initLogin();
        bindMenu();
        initCollapse();
    })();
</script>
</body>
</html>
