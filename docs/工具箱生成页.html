<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>新华书店 · 供应中心工具箱（动态导航）</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03060c);
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            padding: 2rem;
            position: relative;
        }
        /* 动态光晕背景 */
        .orb {
            position: fixed;
            width: 60vmax;
            height: 60vmax;
            border-radius: 50%;
            filter: blur(80px);
            animation: float 20s infinite alternate ease-in-out;
            pointer-events: none;
            z-index: 0;
        }
        .orb1 { top: -20vh; left: -20vw; background: radial-gradient(circle, rgba(0, 200, 255, 0.2), transparent 80%); }
        .orb2 { bottom: -30vh; right: -10vw; width: 70vmax; height: 70vmax; background: radial-gradient(circle, rgba(150, 0, 255, 0.15), transparent 70%); animation-duration: 25s; }
        @keyframes float {
            0% { transform: translate(0, 0) scale(1); opacity: 0.6; }
            100% { transform: translate(5%, 5%) scale(1.1); opacity: 0.9; }
        }
        .container {
            position: relative;
            z-index: 2;
            max-width: 1400px;
            margin: 0 auto;
        }
        .hero {
            text-align: center;
            margin-bottom: 3rem;
        }
        .hero h1 {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFFFFF, #A0D8FF, #7AA2F7);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .hero p {
            color: #9aaec7;
            font-size: 1.1rem;
            margin-top: 0.75rem;
        }
        /* 卡片网格 */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            margin: 2rem 0 3rem;
        }
        .card {
            background: rgba(20, 28, 40, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            border: 1px solid rgba(72, 187, 255, 0.3);
            padding: 1.5rem;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }
        .card:hover {
            transform: translateY(-6px);
            border-color: #00b4ff;
            background: rgba(25, 35, 55, 0.8);
            box-shadow: 0 20px 30px -12px black;
        }
        .icon {
            font-size: 3rem;
            margin-bottom: 0.8rem;
        }
        .card h3 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #eef5ff;
            margin-bottom: 0.5rem;
        }
        .card p {
            color: #b9c8f0;
            font-size: 0.85rem;
            line-height: 1.5;
            flex: 1;
            margin-bottom: 1rem;
        }
        .badge {
            background: rgba(0, 180, 255, 0.2);
            border-radius: 40px;
            padding: 0.2rem 1rem;
            font-size: 0.7rem;
            color: #7bc5ff;
            width: fit-content;
        }
        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.5rem;
        }
        .btn-launch {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(0, 212, 255, 0.5);
            color: #cae9ff;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-launch:hover {
            background: rgba(0, 160, 255, 0.3);
            border-color: cyan;
        }
        .btn-edit, .btn-delete {
            background: none;
            border: none;
            color: #a0b8d4;
            font-size: 0.7rem;
            cursor: pointer;
            margin-left: 8px;
            padding: 4px;
        }
        .btn-edit:hover { color: #ffb347; }
        .btn-delete:hover { color: #ff6b6b; }
        .add-tool-panel {
            background: rgba(10, 15, 30, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 1.5rem;
            margin-top: 1rem;
            border: 1px solid rgba(0, 180, 255, 0.4);
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: flex-end;
        }
        .add-tool-panel input, .add-tool-panel textarea {
            background: #111722;
            border: 1px solid #2a3a5a;
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            color: white;
            font-size: 0.8rem;
            width: 180px;
        }
        .add-tool-panel textarea { width: 260px; resize: vertical; }
        .add-tool-panel button {
            background: #2b4c7c;
            border: none;
            border-radius: 2rem;
            padding: 0.5rem 1.2rem;
            color: white;
            cursor: pointer;
        }
        .footer-note {
            text-align: center;
            color: #62748c;
            border-top: 1px solid rgba(72, 120, 184, 0.3);
            padding-top: 2rem;
            margin-top: 1rem;
            font-size: 0.8rem;
        }
        @media (max-width: 700px) {
            .hero h1 { font-size: 2.2rem; }
            .add-tool-panel input, .add-tool-panel textarea { width: 100%; }
        }
    </style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="container">
    <div class="hero">
        <h1>📦 新华书店 · 供应中心工具箱</h1>
        <p>动态导航 | 可自定义添加工具页</p>
    </div>

    <div class="grid" id="toolsGrid"></div>

    <div class="add-tool-panel" id="addPanel">
        <input type="text" id="toolName" placeholder="工具名称 (例：订单统计)" value="">
        <input type="text" id="toolUrl" placeholder="页面路径 (例：stats.html)" value="">
        <input type="text" id="toolIcon" placeholder="图标 Emoji (例：📊)" value="📄">
        <textarea id="toolDesc" placeholder="简短描述" rows="1"></textarea>
        <button id="addToolBtn">➕ 添加工具</button>
    </div>
    <div class="footer-note">
        💡 点击卡片即可打开工具页面。每个工具可编辑图标、URL和描述，删除后不可恢复。<br>
        ✨ 所有数据保存在浏览器中，不会丢失。新增的页面只需放在同一文件夹下。
    </div>
</div>

<script>
    // 默认默认工具列表（第一个工具箱内置的三个）
    const DEFAULT_TOOLS = [
        {
            id: "entry",
            name: "📝 数据录入",
            desc: "快速扫码/手动录入图书，支持三种模式，自动合并重复书号，生成发货单与汇总单。",
            icon: "📚",
            url: "工具箱-数据录入.html"
        },
        {
            id: "review",
            name: "✅ 数据复核",
            desc: "导入Excel数据复核，自动识别ISBN列，过滤空列，支持双击编辑和ISBN快速定位。",
            icon: "🔍",
            url: "工具箱-数据复核.html"
        },
        {
            id: "transfer",
            name: "🔄 批销直转",
            desc: "将供货商Excel转换为标准批销格式，按包号分组打包ZIP，智能列映射。",
            icon: "📦",
            url: "工具箱-数据直转.html"
        },
		{
            id: "dd",
            name: "🧾订单大屏",
            desc: "通过大屏展示订单的到货情况批销情况。",
            icon: "📈",
            url: "工具箱-订单大屏.html"
        },
        {
            id: "dd-jd",
            name: "📑订单大屏简单版",
            desc: "通过大屏展示订单的简单到货情况。",
            icon: "📉",
            url: "工具箱-订单大屏简单版.html"
        },
        {
            id: "jh",
            name: "💡鲲鹏计划",
            desc: "一个简单的计划展示大屏幕。",
            icon: "💎",
            url: "工具箱-鲲鹏计划AI版.html"
        }
    ];

    let toolsList = [];

    function saveTools() {
        localStorage.setItem('dynamic_tools_list', JSON.stringify(toolsList));
    }

    function loadTools() {
        const stored = localStorage.getItem('dynamic_tools_list');
        if(stored) {
            toolsList = JSON.parse(stored);
        } else {
            // 初次加载，写入默认工具
            toolsList = JSON.parse(JSON.stringify(DEFAULT_TOOLS));
            saveTools();
        }
        renderGrid();
    }

    function renderGrid() {
        const grid = document.getElementById('toolsGrid');
        if(!grid) return;
        grid.innerHTML = '';
        toolsList.forEach((tool, idx) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.setAttribute('data-idx', idx);
            // 点击卡片主体打开
            card.addEventListener('click', (e) => {
                if(e.target.tagName === 'BUTTON') return;
                if(tool.url) window.open(tool.url, '_blank');
            });

            const iconHtml = tool.icon ? tool.icon : '📄';
            card.innerHTML = `
                <div class="icon">${iconHtml}</div>
                <h3>${escapeHtml(tool.name)}</h3>
                <p>${escapeHtml(tool.desc || '暂无描述')}</p>
                <div class="card-footer">
                    <span class="badge">⚙️ 内部工具</span>
                    <div>
                        <button class="btn-edit" data-idx="${idx}">✏️ 编辑</button>
                        <button class="btn-delete" data-idx="${idx}">🗑️ 删除</button>
                        <button class="btn-launch" data-url="${escapeAttr(tool.url)}">🚀 启动</button>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });

        // 绑定编辑删除启动事件
        document.querySelectorAll('.btn-edit').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const idx = parseInt(btn.getAttribute('data-idx'));
                editTool(idx);
            });
        });
        document.querySelectorAll('.btn-delete').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const idx = parseInt(btn.getAttribute('data-idx'));
                if(confirm(`确定删除工具「${toolsList[idx].name}」吗？`)) {
                    toolsList.splice(idx, 1);
                    saveTools();
                    renderGrid();
                }
            });
        });
        document.querySelectorAll('.btn-launch').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const url = btn.getAttribute('data-url');
                if(url) window.open(url, '_blank');
            });
        });
    }

    function editTool(idx) {
        const tool = toolsList[idx];
        const newName = prompt('修改工具名称', tool.name);
        if(newName !== null) tool.name = newName;
        const newUrl = prompt('修改页面路径 (相对路径)', tool.url);
        if(newUrl !== null) tool.url = newUrl;
        const newIcon = prompt('修改图标 (Emoji 或文字)', tool.icon);
        if(newIcon !== null) tool.icon = newIcon;
        const newDesc = prompt('修改描述', tool.desc);
        if(newDesc !== null) tool.desc = newDesc;
        saveTools();
        renderGrid();
    }

    function addNewTool() {
        const name = document.getElementById('toolName').value.trim();
        const url = document.getElementById('toolUrl').value.trim();
        let icon = document.getElementById('toolIcon').value.trim();
        const desc = document.getElementById('toolDesc').value.trim();

        if(!name || !url) {
            alert('工具名称和页面路径不能为空');
            return;
        }
        if(!icon) icon = '📄';
        const newId = Date.now().toString();
        toolsList.push({
            id: newId,
            name: name,
            url: url,
            icon: icon,
            desc: desc || '无描述'
        });
        saveTools();
        renderGrid();
        // 清空表单
        document.getElementById('toolName').value = '';
        document.getElementById('toolUrl').value = '';
        document.getElementById('toolIcon').value = '';
        document.getElementById('toolDesc').value = '';
    }

    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }
    function escapeAttr(str) {
        if(!str) return '';
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    document.getElementById('addToolBtn').addEventListener('click', addNewTool);
    loadTools();
</script>
</body>
</html>
